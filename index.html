                        const company = companyData[companyKey];
                        let priceCurrency = 'USD';
                        if (company.type === 'public') {
                            if (company.currentPrice?.hk && !company.currentPrice?.us) {
                                priceCurrency = 'HKD';
                            } else if (company.currentPrice?.us) {
                                priceCurrency = 'USD';
                            } else if (company.currentPrice?.cny) {
                                priceCurrency = 'RMB';
                            }
                        } else {
                            priceCurrency = company.grantPrice?.[0]?.currency || 'USD';
                        }

                        const yearlyDataWithPrice = yearlyData.map(year => {
                            // 获取该年的股价（原始货币）
                            let priceOriginal = 0;

                            // 查找历史价格数据
                            if (company.yearlyAvgPrice) {
                                const historicalData = company.yearlyAvgPrice.find(item => item.year === year.year);
                                if (historicalData) {
                                    // 如果历史数据货币与主货币一致，直接使用
                                    if (historicalData.currency === priceCurrency) {
                                        priceOriginal = historicalData.price;
                                    } else {
                                        // 需要转换货币 - 统一使用动态汇率
                                        let historicalRate, targetRate;
                                        if (historicalData.currency === 'USD') {
                                            historicalRate = exchangeRates.USD_CNY;
                                        } else if (historicalData.currency === 'HKD') {
                                            historicalRate = exchangeRates.HKD_CNY;
                                        } else {
                                            historicalRate = 1;
                                        }

                                        if (priceCurrency === 'USD') {
                                            targetRate = exchangeRates.USD_CNY;
                                        } else if (priceCurrency === 'HKD') {
                                            targetRate = exchangeRates.HKD_CNY;
                                        } else {
                                            targetRate = 1;
                                        }

                                        const priceCNY = historicalData.price * historicalRate;
                                        priceOriginal = priceCNY / targetRate;
                                    }
                                }
                            }

                            // 如果没有历史数据，使用当前价格
                            if (priceOriginal === 0) {
                                grants.forEach(g => {
                                    if (g.type === 'lti' || typeof g.currentPriceCNY === 'undefined' || g.currentPriceCNY === null) return;
                                    // 统一使用全局汇率
                                    let targetRate;
                                    if (priceCurrency === 'USD') {
                                        targetRate = exchangeRates.USD_CNY;
                                    } else if (priceCurrency === 'HKD') {
                                        targetRate = exchangeRates.HKD_CNY;
                                    } else {
                                        targetRate = 1;
                                    }
                                    priceOriginal = g.currentPriceCNY / targetRate;
                                });
                            }

                            return { ...year, priceOriginal, priceCurrency };
                        });

                        const chartWidth = 800;
                        const chartHeight = 420;
                        const padding = { top: 40, right: 80, bottom: 60, left: 80 };
                        const plotWidth = chartWidth - padding.left - padding.right;
                        const plotHeight = chartHeight - padding.top - padding.bottom;

                        // 根据年份数量动态调整绘图宽度，让柱子更紧凑
                        const numYears = yearlyData.length;
                        const effectivePlotWidth = Math.min(plotWidth, numYears * 70); // 每年最多70px
                        const plotOffsetX = padding.left + (plotWidth - effectivePlotWidth) / 2; // 居中偏移

                        // 计算Y轴范围
                        // 左Y轴：总包价值
                        const maxTotalRounded = Math.max(50000, Math.ceil(maxTotal / 50000) * 50000); // 向上取整到5万，最小5万
                        const leftYTicks = [0, maxTotalRounded * 0.25, maxTotalRounded * 0.5, maxTotalRounded * 0.75, maxTotalRounded];

                        // 右Y轴：股价（原始货币）
                        const priceValues = yearlyDataWithPrice.map(d => d.priceOriginal).filter(p => p > 0);
                        const maxPrice = priceValues.length > 0 ? Math.max(...priceValues) : 100;
                        const minPrice = priceValues.length > 0 ? Math.min(...priceValues) : 0;
                        const priceRange = maxPrice - minPrice;
                        const pricePadding = priceRange > 0 ? priceRange * 0.2 : maxPrice * 0.2;
                        const rightYMin = Math.max(0, minPrice - pricePadding);
                        const rightYMax = maxPrice + pricePadding;
                        const rightYRange = rightYMax - rightYMin;
                        const rightYTicks = rightYRange > 0 ? [rightYMin, rightYMin + rightYRange * 0.25, rightYMin + rightYRange * 0.5, rightYMin + rightYRange * 0.75, rightYMax] : [0, 25, 50, 75, 100];

                        // 货币符号
                        const currencySymbol = priceCurrency === 'USD' ? '$' : priceCurrency === 'HKD' ? 'HK$' : '¥';
                        const currencyLabel = priceCurrency === 'USD' ? '美元' : priceCurrency === 'HKD' ? '港币' : '人民币';

                        // 如果没有年份数据，不显示图表
                        if (yearlyDataWithPrice.length === 0) return '';

                        // 基准线价格（当前回购价）
                        const baselinePrice = yearlyDataWithPrice[yearlyDataWithPrice.length - 1].priceOriginal || 200;

                        // 柱子宽度 - 增加到0.75让柱子更紧凑
                        const barWidth = Math.min(60, effectivePlotWidth / Math.max(1, yearlyDataWithPrice.length) * 0.75);

                        // 获取入职年份的股价
                        const joinYearData = yearlyDataWithPrice[0];
                        const joinPrice = joinYearData ? joinYearData.priceOriginal : 0;

                        return `
                            <h3 style="margin-bottom: 3px; margin-top: 15px;">📊 人选价值轨迹图</h3>
                            <div class="chart-container" style="background: white; padding: 15px 20px; border-radius: 12px; margin: 0;">
                                <svg viewBox="0 0 ${chartWidth} ${chartHeight}" preserveAspectRatio="xMidYMid meet" style="width: 100%; height: auto; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial', sans-serif;">

                                    <!-- 堆叠柱状图 -->

                                        const cashHeight = (d.cashIncome / maxTotalRounded) * plotHeight;

                                        const cashY = padding.top + plotHeight - cashHeight;

                                            <rect x="${x}" y="${cashY}" width="${barWidth}" height="${cashHeight}"

                                                fill="#E1F2FB" opacity="0.95"/>
                                        `;
                                    }).join('')}

                                    <!-- 基准线（右Y轴） - 在柱子之后绘制，显示在上层 -->
                                    ${(() => {
                                        if (rightYRange <= 0) return '';
                                        const y = padding.top + plotHeight - ((baselinePrice - rightYMin) / rightYRange) * plotHeight;
                                        return `
                                            <line x1="${padding.left}" y1="${y}" x2="${padding.left + plotWidth}" y2="${y}"
                                                stroke="#FF69B4" stroke-width="2.5" stroke-dasharray="5,5"/>

                                                fill="#FF69B4" font-size="11" font-weight="600">${currencySymbol}${baselinePrice.toFixed(priceCurrency === 'RMB' ? 0 : 1)}</text>
                                        `;

                                    <!-- 股价折线（浅灰色虚线） - 在柱子之后绘制，显示在上层 -->
                                    ${(() => {

                                        let path = '';

                                    <!-- 股价锚点（鼠标悬停显示价格） - 在最上层 -->
                                    ${rightYRange > 0 ? yearlyDataWithPrice.map((d, i) => {

                                                        ${priceLabel}

                                    <!-- 坐标轴 -->

                                        x2="${padding.left + plotWidth}" y2="${padding.top + plotHeight}"

                                    <line x1="${padding.left}" y1="${padding.top}"
                                        x2="${padding.left}" y2="${padding.top + plotHeight}"
                                        stroke="#333" stroke-width="2"/>
                                    <line x1="${padding.left + plotWidth}" y1="${padding.top}"
                                        x2="${padding.left + plotWidth}" y2="${padding.top + plotHeight}"
                                        stroke="#333" stroke-width="2"/>

                                    <!-- Y轴标签 -->
                                    <text x="${padding.left - 55}" y="${padding.top - 15}" fill="#666" font-size="12" font-weight="600">
                                        年度总价值 (万 RMB)
                                    </text>
                                    <text x="${padding.left + plotWidth + 55}" y="${padding.top - 15}" text-anchor="end" fill="#666" font-size="12" font-weight="600">
                                        股价/回购价 (${currencyLabel})
                                    </text>


                                </svg>

                                <div style="margin-top: 5px; padding: 12px 15px; background: #F5FAFD; border-radius: 8px; font-size: 12px; line-height: 1.8; color: #666;">
                                    <strong style="color: #4069B3;">💡 图表说明：</strong><br>
                                    • <strong>图例：</strong><span style="display: inline-block; width: 12px; height: 12px; background: #4069B3; margin: 0 5px; vertical-align: middle;"></span>深蓝柱=现金 ｜ <span style="display: inline-block; width: 12px; height: 12px; background: #E1F2FB; margin: 0 5px; vertical-align: middle; border: 1px solid #ddd;"></span>淡蓝柱=股票价值 ｜ <span style="display: inline-block; width: 20px; height: 0; border-top: 2px dashed #999; margin: 0 5px; vertical-align: middle;"></span>浅灰虚线=股价 ｜ <span style="display: inline-block; width: 20px; height: 0; border-top: 2px dashed #FF69B4; margin: 0 5px; vertical-align: middle;"></span>粉色虚线=当前价<br>
                                    • <strong>左Y轴</strong>：年度总价值（万RMB）｜ <strong>右Y轴</strong>：股价/回购价（${currencyLabel}）<br>
                                    • 每个年份显示从当年测算月下一个月开始的12个月滚动总包<br>
                                    • 股票价值：历史年份采用当年股价年均值，当前及未来年份采用当前180天均价
                                </div>
                            </div>
                        `;
                    })()}
                </div>
                ` : ''}
            `;

            document.getElementById('results').innerHTML = html;
            document.getElementById('resultSection').classList.add('show');
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
